  <style>
  :root {
      --dynamic-primary: #06B6D4; /* Default cyan-400 */
      --dynamic-accent-1: #8B5CF6; /* Default purple-500 */
      --dynamic-accent-2: #EC4899; /* Default pink-500 */

    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    0% { transform: rotate(0deg); }

  }

  @keyframes line-clear-dissolve {
    0% {
      opacity: 1;
      transform: scale(1);
      box-shadow: 0 0 10px var(--dynamic-accent-1);
    }
    50% {
      opacity: 0.8;
      transform: scale(1.1);
      box-shadow: 0 0 20px var(--dynamic-accent-1);
    }
    100% {
      opacity: 0;
      transform: scale(1.2);
      filter: drop-shadow(0 0 0px var(--dynamic-accent-1)); /* Clean fade out */
    }
  }

  .line-clear-cell-overlay {
    position: absolute;
    inset: 0;
    background-color: var(--dynamic-accent-1);

</style>
